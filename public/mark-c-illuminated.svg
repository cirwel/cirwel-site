<!--
  CIRWEL Systems — illuminated C device.

  The typographic-mark variant (the "C") rendered in the same copperplate-
  engraving register as logo-engraved.svg. Reads as an illuminated initial
  from an 18th-c book frontispiece: serif C in oxblood, cross-hatching
  inside the letter body, ornamental cartouche border with corner fleurons,
  hand-cut stroke roughness, hairline outer ring.

  Intended for view as a brand mark (not a 16px favicon — too detailed).
  View at https://cirwel.org/mark-c-illuminated.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Hand-cut engraving roughness — siblings logo-engraved.svg's filter -->
    <filter id="engrave2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.55"/>
    </filter>

    <!-- Cross-hatch for inside-letter shading (45° lines) -->
    <pattern id="cHatch" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#7A1F1F" stroke-width="0.45"/>
    </pattern>

    <!-- Counter-hatch for cross-hatching the deepest shadow region -->
    <pattern id="cHatch2" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#7A1F1F" stroke-width="0.4"/>
    </pattern>

    <!-- The serif C, drawn as a path at center.
         A wide stem that opens to the right, with terminal serifs.
         Roughly: outer oval, cut by an inner oval, opening on the right. -->
    <path id="serifC" d="
      M 138 56
      C 122 44, 102 40,  88 42
      C 62 46,  44 70,   42 100
      C 44 130, 62 154,  88 158
      C 102 160, 122 156, 138 144
      L 142 154
      C 124 168, 100 172,  82 168
      C 50 162,  30 132,  28 100
      C 30 68,   50 38,   82 32
      C 100 28, 124 32, 142 46
      Z
      M 134 70
      C 122 60, 106 56, 92 60
      C 72 64,  60 82,  58 100
      C 60 118, 72 136, 92 140
      C 106 144, 122 140, 134 130
      L 130 122
      C 120 130, 106 132, 96 130
      C 80 126, 72 112, 70 100
      C 72 88,  80 74, 96 70
      C 106 68, 120 70, 130 78
      Z
    "/>
  </defs>

  <!-- Cream paper -->
  <rect width="200" height="200" fill="#F5F1E8"/>

  <!-- Whole device under engraving filter -->
  <g filter="url(#engrave2)">

    <!-- Outer cartouche frame: hairline rectangle with notched corners -->
    <g stroke="#7A1F1F" fill="none">
      <!-- Main rectangle -->
      <rect x="20" y="20" width="160" height="160" stroke-width="1.4"/>
      <!-- Inner double-line, classic engraved frame -->
      <rect x="26" y="26" width="148" height="148" stroke-width="0.5"/>

      <!-- Corner fleurons — small typographic ornaments at each corner -->
      <g stroke-width="0.7">
        <!-- TL fleuron: small four-petal cross -->
        <line x1="20" y1="20" x2="32" y2="32"/>
        <circle cx="22" cy="22" r="1.4" fill="#7A1F1F"/>
        <!-- TR -->
        <line x1="180" y1="20" x2="168" y2="32"/>
        <circle cx="178" cy="22" r="1.4" fill="#7A1F1F"/>
        <!-- BL -->
        <line x1="20" y1="180" x2="32" y2="168"/>
        <circle cx="22" cy="178" r="1.4" fill="#7A1F1F"/>
        <!-- BR -->
        <line x1="180" y1="180" x2="168" y2="168"/>
        <circle cx="178" cy="178" r="1.4" fill="#7A1F1F"/>
      </g>

      <!-- Top ornamental swag — small flourish centered above the C -->
      <g stroke-width="0.7" fill="none">
        <path d="M 80 22 Q 100 14, 120 22"/>
        <circle cx="100" cy="20" r="1.6" fill="#7A1F1F"/>
        <line x1="92" y1="22" x2="86" y2="14"/>
        <line x1="108" y1="22" x2="114" y2="14"/>
      </g>

      <!-- Bottom ornamental swag — mirror -->
      <g stroke-width="0.7" fill="none">
        <path d="M 80 178 Q 100 186, 120 178"/>
        <circle cx="100" cy="180" r="1.6" fill="#7A1F1F"/>
        <line x1="92" y1="178" x2="86" y2="186"/>
        <line x1="108" y1="178" x2="114" y2="186"/>
      </g>
    </g>

    <!-- Serif C, filled with cross-hatch (inside the letter body) -->
    <use href="#serifC" fill="url(#cHatch)" />
    <!-- Letter outline, stronger stroke -->
    <use href="#serifC" fill="none" stroke="#7A1F1F" stroke-width="1.4" stroke-linejoin="round"/>

    <!-- A small overlay of counter-hatch on the lower-left curve only,
         giving the letter a sense of carved depth on its shadowed side -->
    <clipPath id="cShadow">
      <use href="#serifC"/>
    </clipPath>
    <g clip-path="url(#cShadow)">
      <rect x="22" y="100" width="60" height="80" fill="url(#cHatch2)" opacity="0.6"/>
    </g>

    <!-- Tiny printer's-mark dot in the eye/aperture of the C, anchoring the device -->
    <circle cx="100" cy="100" r="2.2" fill="#7A1F1F"/>
  </g>
</svg>
