<!--
  CIRWEL Systems — favicon-scale engraved hex.

  Tab-scale (16-32px) companion to logo-engraved.svg. The full engraved
  treatment (cross-hatching, connecting lines, ornament) mushes at favicon
  size, so this version distills the hex device down to legible essentials
  while keeping the engraving family resemblance: hand-cut roughness filter,
  same oxblood/cream/sepia palette, hairline shadow strokes on right faces
  to suggest the cross-hatching present in the larger version.

  Viewable at https://cirwel.org/favicon-hex.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Light hand-cut roughness — much more restrained than the 200x200 version
         to keep the silhouette legible at 16x16 -->
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="1" seed="2" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.18"/>
    </filter>
  </defs>

  <!-- Cream paper, slightly rounded -->
  <rect x="0" y="0" width="32" height="32" rx="4" fill="#F5F1E8"/>

  <!-- Hairline ring, sibling style -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="3.5"
        fill="none" stroke="#C9C0AE" stroke-width="1"/>

  <g filter="url(#rough)">
    <!-- Outer flat-top hexagon, slightly heavier stroke for legibility at 16px -->
    <polygon points="10,5.6 22,5.6 28,16 22,26.4 10,26.4 4,16"
             fill="none" stroke="#7A1F1F" stroke-width="1.6" stroke-linejoin="round"/>

    <!-- Inner nested hexagon — distilled from logo-engraved -->
    <polygon points="13,10.8 19,10.8 22,16 19,21.2 13,21.2 10,16"
             fill="none" stroke="#7A1F1F" stroke-width="0.9" stroke-linejoin="round"/>

    <!-- Three short hairline strokes on the right-hand faces — hatching reduced
         to its minimum legible form, the way a tiny printer's mark would hint
         at depth without rendering it -->
    <g stroke="#7A1F1F" stroke-width="0.55" opacity="0.85">
      <line x1="22.5" y1="7.5"  x2="24.0" y2="9.5" />
      <line x1="25.5" y1="13.5" x2="26.5" y2="14.7"/>
      <line x1="22.5" y1="24.5" x2="24.0" y2="22.5"/>
    </g>

    <!-- Solid filled center hex device, matches logo-engraved -->
    <polygon points="14.7,14.7 17.3,14.7 18.6,16 17.3,17.3 14.7,17.3 13.4,16"
             fill="#7A1F1F"/>
  </g>
</svg>
