<!--
  FIG. 4 — The shared knowledge graph.
  A node-and-edge plate in the same engraving register as FIG. 1–3: a
  central substrate device with five entry-type nodes around it, each a
  hex device with a characteristic glyph. Edges show the graph is written
  by the whole fleet. Hex device = the publisher's mark, for continuity.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="2160" height="1320">
  <defs>
    <filter id="rough4" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.5"/>
    </filter>
    <polygon id="ctrHex" points="-16,-27.7 16,-27.7 32,0 16,27.7 -16,27.7 -32,0"/>
    <polygon id="satHex" points="-12,-20.8 12,-20.8 24,0 12,20.8 -12,20.8 -24,0"/>
  </defs>

  <!-- Cream paper -->
  <rect width="720" height="440" fill="#F5F1E8"/>

  <!-- Plate frame -->
  <rect x="20" y="20" width="680" height="400" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
  <rect x="26" y="26" width="668" height="388" fill="none" stroke="#7A1F1F" stroke-width="0.4"/>

  <!-- Corner fleurons -->
  <g stroke="#7A1F1F" stroke-width="0.7" fill="#7A1F1F">
    <line x1="20" y1="20" x2="34" y2="34" fill="none"/><circle cx="22" cy="22" r="1.6"/>
    <line x1="700" y1="20" x2="686" y2="34" fill="none"/><circle cx="698" cy="22" r="1.6"/>
    <line x1="20" y1="420" x2="34" y2="406" fill="none"/><circle cx="22" cy="418" r="1.6"/>
    <line x1="700" y1="420" x2="686" y2="406" fill="none"/><circle cx="698" cy="418" r="1.6"/>
  </g>

  <!-- Plate-numeral marker, upper right -->
  <text x="678" y="50" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9.5" letter-spacing="2.5" fill="#7A1F1F" font-weight="500">Pl. IV</text>

  <g filter="url(#rough4)">

    <!-- EDGES (drawn first, occluded by cream-filled nodes) -->
    <g stroke="#7A1F1F" fill="none">
      <!-- spokes: centre (360,170) to each satellite -->
      <g stroke-width="1">
        <line x1="360" y1="170" x2="360" y2="78"/>
        <line x1="360" y1="170" x2="452" y2="140"/>
        <line x1="360" y1="170" x2="417" y2="250"/>
        <line x1="360" y1="170" x2="303" y2="250"/>
        <line x1="360" y1="170" x2="268" y2="140"/>
      </g>
      <!-- ring edges: graph is interconnected, not a star -->
      <g stroke-width="0.7" opacity="0.55">
        <line x1="360" y1="78"  x2="452" y2="140"/>
        <line x1="452" y1="140" x2="417" y2="250"/>
        <line x1="417" y1="250" x2="303" y2="250"/>
        <line x1="303" y1="250" x2="268" y2="140"/>
        <line x1="268" y1="140" x2="360" y2="78"/>
      </g>
    </g>

    <!-- CENTRE: the substrate device -->
    <g transform="translate(360,170)">
      <use href="#ctrHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.4"/>
      <!-- small graph glyph: three connected nodes -->
      <g stroke="#7A1F1F" stroke-width="1" fill="#7A1F1F">
        <line x1="-9" y1="6" x2="0" y2="-9" fill="none"/>
        <line x1="0" y1="-9" x2="9" y2="6" fill="none"/>
        <line x1="-9" y1="6" x2="9" y2="6" fill="none"/>
        <circle cx="-9" cy="6" r="2.4"/>
        <circle cx="0" cy="-9" r="2.4"/>
        <circle cx="9" cy="6" r="2.4"/>
      </g>
    </g>

    <!-- SATELLITE I — DISCOVERY (top): spark -->
    <g transform="translate(360,78)">
      <use href="#satHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.2"/>
      <g stroke="#7A1F1F" stroke-width="1">
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="-6" y1="6" x2="6" y2="-6"/>
      </g>
    </g>

    <!-- SATELLITE II — DECISION (upper right): fork -->
    <g transform="translate(452,140)">
      <use href="#satHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.2"/>
      <g stroke="#7A1F1F" stroke-width="1.1" fill="none">
        <path d="M 0 9 L 0 0 M 0 0 L -8 -8 M 0 0 L 8 -8"/>
      </g>
    </g>

    <!-- SATELLITE III — DIALECTIC (lower right): thesis / antithesis -->
    <g transform="translate(417,250)">
      <use href="#satHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.2"/>
      <g stroke="#7A1F1F" stroke-width="1.1" fill="none">
        <path d="M -9 -3 L 9 -3 M 4 -7 L 9 -3 L 4 1"/>
        <path d="M 9 6 L -9 6 M -4 2 L -9 6 L -4 10"/>
      </g>
    </g>

    <!-- SATELLITE IV — FINDING (lower left): flag -->
    <g transform="translate(303,250)">
      <use href="#satHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.2"/>
      <g stroke="#7A1F1F" stroke-width="1.1" fill="none">
        <line x1="-6" y1="-9" x2="-6" y2="9"/>
        <path d="M -6 -9 L 7 -6 L -6 -3 Z" fill="#7A1F1F" stroke="none"/>
      </g>
    </g>

    <!-- SATELLITE V — AGENT (upper left): nested hex (a writer) -->
    <g transform="translate(268,140)">
      <use href="#satHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.2"/>
      <polygon points="-7,-6 7,-6 11,0 7,6 -7,6 -11,0"
               fill="none" stroke="#7A1F1F" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.6" fill="#7A1F1F"/>
    </g>

    <!-- Node labels -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="9" letter-spacing="2" fill="#1A1612" text-anchor="middle" font-weight="500">
      <text x="360" y="42">DISCOVERY</text>
      <text x="500" y="132">DECISION</text>
      <text x="450" y="284">DIALECTIC</text>
      <text x="270" y="284">FINDING</text>
      <text x="222" y="132">AGENT</text>
    </g>

    <!-- Italic body subtitle -->
    <text x="360" y="328"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="14" font-style="italic" fill="#1A1612" text-anchor="middle">
      Postgres + Apache AGE + pgvector, joined by reciprocal-rank fusion.
    </text>
    <text x="360" y="348"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="14" font-style="italic" fill="#5C544A" text-anchor="middle">
      Every entry carries provenance and a status lifecycle.
    </text>
  </g>

  <!-- Caption divider rule, with centered fleuron dot -->
  <line x1="80"  y1="370" x2="350" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <circle cx="360" cy="370" r="1.6" fill="#7A1F1F"/>
  <line x1="370" y1="370" x2="640" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <text x="360" y="392"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="3" fill="#7A1F1F" text-anchor="middle">
    FIG. IV · THE SHARED KNOWLEDGE GRAPH
  </text>
  <text x="360" y="408"
        font-family="'Fraunces Variable', Georgia, serif"
        font-size="11" font-style="italic" fill="#5C544A" text-anchor="middle">
    One graph, written by the whole fleet; nothing it learns lives in one head.
  </text>
</svg>
