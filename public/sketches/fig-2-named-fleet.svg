<!--
  FIG. 2 — Heterogeneous agent classes.
  A specimen plate, after the manner of botanical illustrations: each
  agent class gets a Roman-numeral ID, a small hex device with a
  characteristic glyph inside, and a name. The hex pattern is the same
  device used in the publisher's mark — visual continuity.

  Engraving register matches FIG. 1 and FIG. 3.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440">
  <defs>
    <filter id="rough2" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.5"/>
    </filter>

    <!-- Reusable hex (flat-top, r=32) for the specimen device frames -->
    <polygon id="specHex" points="-16,-27.7 16,-27.7 32,0 16,27.7 -16,27.7 -32,0"/>
  </defs>

  <!-- Cream paper -->
  <rect width="720" height="440" fill="#F5F1E8"/>

  <!-- Plate frame -->
  <rect x="20" y="20" width="680" height="400" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
  <rect x="26" y="26" width="668" height="388" fill="none" stroke="#7A1F1F" stroke-width="0.4"/>

  <!-- Corner fleurons -->
  <g stroke="#7A1F1F" stroke-width="0.7" fill="#7A1F1F">
    <line x1="20" y1="20" x2="34" y2="34" fill="none"/><circle cx="22" cy="22" r="1.6"/>
    <line x1="700" y1="20" x2="686" y2="34" fill="none"/><circle cx="698" cy="22" r="1.6"/>
    <line x1="20" y1="420" x2="34" y2="406" fill="none"/><circle cx="22" cy="418" r="1.6"/>
    <line x1="700" y1="420" x2="686" y2="406" fill="none"/><circle cx="698" cy="418" r="1.6"/>
  </g>

  <!-- Faint stipple background pattern in the specimen-plate area, like a plate's tooth -->
  <g opacity="0.12">
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="2" cy="2" r="0.35" fill="#7A1F1F"/>
    </pattern>
    <rect x="60" y="100" width="600" height="170" fill="url(#stipple)"/>
  </g>

  <!-- Five specimens in a row, each on its own plinth -->
  <g filter="url(#rough2)">

    <!-- Specimen I: CODING AGENT — angle brackets inside hex -->
    <g transform="translate(120, 170)">
      <use href="#specHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <text x="0" y="6" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="22" font-weight="500" fill="#7A1F1F">{ }</text>
    </g>

    <!-- Specimen II: RESEARCH AGENT — open page glyph -->
    <g transform="translate(240, 170)">
      <use href="#specHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <g stroke="#7A1F1F" stroke-width="1" fill="none">
        <rect x="-12" y="-10" width="24" height="20"/>
        <line x1="-8"  y1="-5" x2="8"  y2="-5"/>
        <line x1="-8"  y1="0"  x2="8"  y2="0"/>
        <line x1="-8"  y1="5"  x2="4"  y2="5"/>
      </g>
    </g>

    <!-- Specimen III: RESIDENT AGENT — clock face glyph -->
    <g transform="translate(360, 170)">
      <use href="#specHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#7A1F1F" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="-10" stroke="#7A1F1F" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="7" y2="3"   stroke="#7A1F1F" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="1.5" fill="#7A1F1F"/>
    </g>

    <!-- Specimen IV: EMBODIED AGENT — antenna / radiating lines -->
    <g transform="translate(480, 170)">
      <use href="#specHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <g stroke="#7A1F1F" stroke-width="1" fill="none">
        <line x1="0" y1="-12" x2="0" y2="6"/>
        <circle cx="0" cy="-12" r="2.2" fill="#7A1F1F"/>
        <path d="M -10 6  Q 0 14, 10 6"/>
        <path d="M -14 4  Q 0 18, 14 4" opacity="0.6"/>
      </g>
    </g>

    <!-- Specimen V: PARSER AGENT — ephemeral, dashed -->
    <g transform="translate(600, 170)">
      <use href="#specHex" fill="none" stroke="#7A1F1F" stroke-width="1.4" stroke-dasharray="4 2"/>
      <g stroke="#7A1F1F" stroke-width="1" fill="none">
        <path d="M -10 -6 L 0 -6 L 0 0 L 10 0 L 10 6 L -10 6 Z"/>
      </g>
    </g>

    <!-- Roman-numeral IDs above each -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="10" letter-spacing="3" fill="#5C544A" text-anchor="middle">
      <text x="120" y="115">I</text>
      <text x="240" y="115">II</text>
      <text x="360" y="115">III</text>
      <text x="480" y="115">IV</text>
      <text x="600" y="115">V</text>
    </g>

    <!-- Class names below each -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="10" letter-spacing="2.4" fill="#1A1612" text-anchor="middle" font-weight="500">
      <text x="120" y="240">CODING</text>
      <text x="120" y="254" fill="#5C544A">SESSION</text>

      <text x="240" y="240">RESEARCH</text>
      <text x="240" y="254" fill="#5C544A">CONVERSATION</text>

      <text x="360" y="240">RESIDENT</text>
      <text x="360" y="254" fill="#5C544A">CRON</text>

      <text x="480" y="240">EMBODIED</text>
      <text x="480" y="254" fill="#5C544A">EDGE</text>

      <text x="600" y="240">EPHEMERAL</text>
      <text x="600" y="254" fill="#5C544A">PARSER</text>
    </g>

    <!-- Lifespan band beneath specimens — feature annotation convention from
         botanical plates: a hairline scale showing characteristic lifetime per class -->
    <g stroke="#7A1F1F" stroke-width="0.6" opacity="0.55">
      <line x1="80" y1="282" x2="640" y2="282"/>
      <!-- Tick marks at each specimen's column -->
      <line x1="120" y1="280" x2="120" y2="285"/>
      <line x1="240" y1="280" x2="240" y2="285"/>
      <line x1="360" y1="280" x2="360" y2="285"/>
      <line x1="480" y1="280" x2="480" y2="285"/>
      <line x1="600" y1="280" x2="600" y2="285"/>
    </g>
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="8" letter-spacing="1.5" fill="#5C544A" text-anchor="middle" opacity="0.85">
      <text x="120" y="296">~30 min</text>
      <text x="240" y="296">~hours</text>
      <text x="360" y="296">months+</text>
      <text x="480" y="296">always-on</text>
      <text x="600" y="296">seconds</text>
    </g>
    <!-- (No row title — the duration labels under each tick are self-explanatory) -->

    <!-- Italic body subtitle -->
    <text x="360" y="325"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="14" font-style="italic" fill="#1A1612" text-anchor="middle">
      Each class is calibrated against its own baseline.
    </text>
    <text x="360" y="345"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="14" font-style="italic" fill="#5C544A" text-anchor="middle">
      Drift in I is not masked by noise from V.
    </text>
  </g>

  <!-- Plate-numeral marker, upper right -->
  <text x="678" y="50" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9.5" letter-spacing="2.5" fill="#7A1F1F" font-weight="500">Pl. II</text>

  <!-- Caption divider rule, with centered fleuron dot -->
  <line x1="80"  y1="370" x2="350" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <circle cx="360" cy="370" r="1.6" fill="#7A1F1F"/>
  <line x1="370" y1="370" x2="640" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <text x="360" y="392"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="3" fill="#7A1F1F" text-anchor="middle">
    FIG. II · HETEROGENEOUS AGENT CLASSES
  </text>
  <text x="360" y="408"
        font-family="'Fraunces Variable', Georgia, serif"
        font-size="11" font-style="italic" fill="#5C544A" text-anchor="middle">
    A specimen plate. Five representative classes; the catalog is open.
  </text>
</svg>
