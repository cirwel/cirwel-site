<!--
  FIG. III — The four verdicts.

  An alchemical-diagram register: four verdict hexes at the compass
  points of a closed dashed cycle, with the engraved hex device anchored
  at center. Hairline radial lines run from the center device out to
  each verdict — these are the "issued from" lines, signaling provenance.
  Faint hatching shades the outer face of each verdict hex (engraving
  consistency with logo-engraved.svg). Glosses are short, single-word,
  set inside each hex below the verdict label so the geometry breathes.

  Matches FIG. I and FIG. II in plate dimensions, frame, fleurons, caption.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440">
  <defs>
    <filter id="rough3" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.3"/>
    </filter>

    <pattern id="vHatch" patternUnits="userSpaceOnUse" width="3" height="3"
             patternTransform="rotate(40)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#7A1F1F" stroke-width="0.4" opacity="0.6"/>
    </pattern>

    <!-- Verdict hex frame, r=44 -->
    <polygon id="vHex" points="-22,-38.1 22,-38.1 44,0 22,38.1 -22,38.1 -44,0"/>
    <!-- Outer-face triangle (right side) for hatching -->
    <polygon id="vHexOuter" points="22,-38.1 44,0 22,38.1 0,0"/>
    <!-- Center engraved device -->
    <polygon id="centerOuter" points="-22,-38.1 22,-38.1 44,0 22,38.1 -22,38.1 -44,0"/>
    <polygon id="centerInner" points="-12,-20.8 12,-20.8 24,0 12,20.8 -12,20.8 -24,0"/>
    <polygon id="centerDot"   points="-5,-8.7 5,-8.7 10,0 5,8.7 -5,8.7 -10,0"/>
  </defs>

  <!-- Cream paper -->
  <rect width="720" height="440" fill="#F5F1E8"/>

  <!-- Plate frame -->
  <rect x="20" y="20" width="680" height="400" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
  <rect x="26" y="26" width="668" height="388" fill="none" stroke="#7A1F1F" stroke-width="0.4"/>

  <!-- Corner fleurons -->
  <g stroke="#7A1F1F" stroke-width="0.7" fill="#7A1F1F">
    <line x1="20" y1="20" x2="34" y2="34" fill="none"/><circle cx="22" cy="22" r="1.6"/>
    <line x1="700" y1="20" x2="686" y2="34" fill="none"/><circle cx="698" cy="22" r="1.6"/>
    <line x1="20" y1="420" x2="34" y2="406" fill="none"/><circle cx="22" cy="418" r="1.6"/>
    <line x1="700" y1="420" x2="686" y2="406" fill="none"/><circle cx="698" cy="418" r="1.6"/>
  </g>

  <g filter="url(#rough3)">

    <!-- Center coordinates: 360, 200 -->

    <!-- Cycle ring: dashed circle threading through the four verdicts -->
    <circle cx="360" cy="200" r="118" fill="none" stroke="#7A1F1F" stroke-width="0.8"
            stroke-dasharray="3 4" opacity="0.55"/>

    <!-- Radial "issued from" lines from center hex to each verdict — the provenance indicator -->
    <g stroke="#7A1F1F" stroke-width="0.6" opacity="0.5">
      <line x1="360" y1="170" x2="360" y2="124"/>  <!-- to N -->
      <line x1="390" y1="200" x2="436" y2="200"/>  <!-- to E -->
      <line x1="360" y1="230" x2="360" y2="276"/>  <!-- to S -->
      <line x1="330" y1="200" x2="284" y2="200"/>  <!-- to W -->
    </g>

    <!-- VERDICT N: PROCEED — top -->
    <g transform="translate(360, 86)">
      <!-- Outer-face hatching -->
      <use href="#vHexOuter" fill="url(#vHatch)" opacity="0.9"/>
      <!-- Hex outline -->
      <use href="#vHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <!-- Verdict word -->
      <text y="-4" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="12" letter-spacing="2.6" fill="#1A1612" font-weight="500">PROCEED</text>
      <!-- Italic gloss -->
      <text y="16" text-anchor="middle"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="11" font-style="italic" fill="#5C544A">healthy</text>
    </g>

    <!-- VERDICT E: GUIDE — right -->
    <g transform="translate(478, 200)">
      <use href="#vHexOuter" fill="url(#vHatch)" opacity="0.9"/>
      <use href="#vHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <text y="-4" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="12" letter-spacing="2.6" fill="#1A1612" font-weight="500">GUIDE</text>
      <text y="16" text-anchor="middle"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="11" font-style="italic" fill="#5C544A">drifting</text>
    </g>

    <!-- VERDICT S: PAUSE — bottom (mirrored hatch on left face since it faces away) -->
    <g transform="translate(360, 314)">
      <use href="#vHexOuter" fill="url(#vHatch)" opacity="0.9"/>
      <use href="#vHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <text y="-4" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="12" letter-spacing="2.6" fill="#1A1612" font-weight="500">PAUSE</text>
      <text y="16" text-anchor="middle"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="11" font-style="italic" fill="#5C544A">reflect</text>
    </g>

    <!-- VERDICT W: REJECT — left -->
    <g transform="translate(242, 200)">
      <use href="#vHexOuter" fill="url(#vHatch)" opacity="0.9"/>
      <use href="#vHex" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <text y="-4" text-anchor="middle"
            font-family="'JetBrains Mono', ui-monospace, monospace"
            font-size="12" letter-spacing="2.6" fill="#1A1612" font-weight="500">REJECT</text>
      <text y="16" text-anchor="middle"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="11" font-style="italic" fill="#5C544A">escalate</text>
    </g>

    <!-- Central engraved device — same hex-in-hex device as logo-engraved -->
    <g transform="translate(360, 200) scale(0.62)">
      <use href="#centerOuter" fill="none" stroke="#7A1F1F" stroke-width="2"/>
      <use href="#centerInner" fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
      <use href="#centerDot"   fill="#7A1F1F"/>
    </g>

    <!-- Directional chevrons on the cycle ring (clockwise: N→E→S→W→N) -->
    <g stroke="#7A1F1F" stroke-width="1.2" fill="none" stroke-linejoin="round">
      <!-- NE chevron -->
      <path d="M 449 121 L 455 126 L 449 132"/>
      <!-- SE chevron -->
      <path d="M 449 279 L 442 280 L 442 274"/>
      <!-- SW chevron -->
      <path d="M 271 279 L 265 274 L 271 268"/>
      <!-- NW chevron -->
      <path d="M 271 121 L 278 121 L 278 127"/>
    </g>

    <!-- Compass-style cardinal markers around the ring (very subtle) -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="7" letter-spacing="1.5" fill="#5C544A" opacity="0.6" text-anchor="middle">
      <text x="360" y="55">N</text>
      <text x="514" y="204">E</text>
      <text x="360" y="354">S</text>
      <text x="206" y="204">W</text>
    </g>

    <!-- (Transition labels moved out of filter group, below; placed
         at the four corners of the plate, horizontal, well outside the
         cycle ring so they don't overlap the dashed line.) -->

    <!-- Tiny radial tick marks on the cycle ring at each verdict crossing,
         the way a compass rose has degree marks -->
    <g stroke="#7A1F1F" stroke-width="0.5" opacity="0.55">
      <!-- N tick -->
      <line x1="360" y1="80" x2="360" y2="86"/>
      <!-- E tick -->
      <line x1="478" y1="200" x2="472" y2="200"/>
      <!-- S tick -->
      <line x1="360" y1="318" x2="360" y2="324"/>
      <!-- W tick -->
      <line x1="242" y1="200" x2="248" y2="200"/>
    </g>
  </g>

  <!-- Transition labels — placed OUTSIDE the engraving filter (so the
       text stays sharp) AND outside the cycle ring (radius 118 from
       center 360,200), at distance ~146 in the four corner zones, with
       horizontal orientation for legibility. No rotation, no ring overlap. -->
  <g font-family="'Fraunces Variable', Georgia, serif"
     font-size="10" font-style="italic" fill="#7A1F1F" opacity="0.85" text-anchor="middle">
    <!-- NE: PROCEED → GUIDE -->
    <text x="467" y="100">tight margin</text>
    <!-- SE: GUIDE → PAUSE -->
    <text x="467" y="308">no convergence</text>
    <!-- SW: PAUSE → REJECT -->
    <text x="253" y="308">irreparable</text>
    <!-- NW: REJECT → PROCEED -->
    <text x="253" y="100">after dialectic</text>
  </g>

  <!-- Plate-numeral marker, upper right -->
  <text x="678" y="50" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9.5" letter-spacing="2.5" fill="#7A1F1F" font-weight="500">Pl. III</text>

  <!-- Caption divider rule, with centered fleuron dot -->
  <line x1="80"  y1="370" x2="350" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <circle cx="360" cy="370" r="1.6" fill="#7A1F1F"/>
  <line x1="370" y1="370" x2="640" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <text x="360" y="392"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="3" fill="#7A1F1F" text-anchor="middle">
    FIG. III · THE FOUR VERDICTS
  </text>
  <text x="360" y="408"
        font-family="'Fraunces Variable', Georgia, serif"
        font-size="11" font-style="italic" fill="#5C544A" text-anchor="middle">
    Issued continuously, with signed lineage. The cycle is closed; there is no terminal state.
  </text>
</svg>
