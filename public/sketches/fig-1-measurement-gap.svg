<!--
  FIG. I — The measurement gap.

  A scientific data plate. The horizontal axis is time; three regions
  divide it. Pre-deployment and post-incident are dense with measurement
  marks (we observe these directly). The runtime middle is nearly empty
  — only a dashed "trajectory we can't measure" line crosses it, and
  a small italic gloss labels the absence. The visual asymmetry of
  density IS the argument.

  Engraving register matches FIG. II and FIG. III: cream paper, oxblood
  ink, hairline plate frame, corner fleurons, hand-cut roughness, mono
  small-caps captions.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440">
  <defs>
    <filter id="rough1" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.45"/>
    </filter>

    <!-- A small "+" mark for measurement points -->
    <g id="markPlus">
      <line x1="-2.2" y1="0" x2="2.2" y2="0" stroke="#7A1F1F" stroke-width="0.8"/>
      <line x1="0" y1="-2.2" x2="0" y2="2.2" stroke="#7A1F1F" stroke-width="0.8"/>
    </g>
    <!-- A circle dot, lighter -->
    <circle id="markDot" r="0.9" fill="#7A1F1F" opacity="0.8"/>
  </defs>

  <!-- Cream paper -->
  <rect width="720" height="440" fill="#F5F1E8"/>

  <!-- Plate frame: outer + inner hairlines -->
  <rect x="20" y="20" width="680" height="400" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
  <rect x="26" y="26" width="668" height="388" fill="none" stroke="#7A1F1F" stroke-width="0.4"/>

  <!-- Corner fleurons -->
  <g stroke="#7A1F1F" stroke-width="0.7" fill="#7A1F1F">
    <line x1="20" y1="20" x2="34" y2="34" fill="none"/><circle cx="22" cy="22" r="1.6"/>
    <line x1="700" y1="20" x2="686" y2="34" fill="none"/><circle cx="698" cy="22" r="1.6"/>
    <line x1="20" y1="420" x2="34" y2="406" fill="none"/><circle cx="22" cy="418" r="1.6"/>
    <line x1="700" y1="420" x2="686" y2="406" fill="none"/><circle cx="698" cy="418" r="1.6"/>
  </g>

  <!-- Body group under engraving filter -->
  <g filter="url(#rough1)">

    <!-- Region labels above plot -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="9.5" letter-spacing="2.4" fill="#5C544A" text-anchor="middle">
      <text x="160" y="72">PRE-DEPLOYMENT</text>
      <text x="350" y="72">RUNTIME</text>
      <text x="540" y="72">POST-INCIDENT</text>
    </g>
    <!-- Sub-labels: nature of the data in each region -->
    <g font-family="'Fraunces Variable', Georgia, serif"
       font-size="10" font-style="italic" fill="#7A1F1F" text-anchor="middle">
      <text x="160" y="86">benchmarks</text>
      <text x="350" y="86" opacity="0.6">(unknown)</text>
      <text x="540" y="86">forensics</text>
    </g>

    <!-- Plot area: x = 80 .. 620, y = 110 .. 280 -->

    <!-- Y-axis -->
    <line x1="80" y1="110" x2="80" y2="280" stroke="#7A1F1F" stroke-width="1"/>
    <!-- Y-axis tick marks -->
    <g stroke="#7A1F1F" stroke-width="0.7">
      <line x1="76" y1="120" x2="80" y2="120"/>
      <line x1="76" y1="160" x2="80" y2="160"/>
      <line x1="76" y1="200" x2="80" y2="200"/>
      <line x1="76" y1="240" x2="80" y2="240"/>
      <line x1="76" y1="280" x2="80" y2="280"/>
    </g>
    <!-- Y-axis label, rotated -->
    <text x="48" y="195" text-anchor="middle"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="9" letter-spacing="2.5" fill="#5C544A"
          transform="rotate(-90, 48, 195)">OBSERVABILITY</text>

    <!-- Vertical region dividers (faint hairlines) -->
    <line x1="240" y1="110" x2="240" y2="280" stroke="#C9C0AE" stroke-width="0.7" stroke-dasharray="3 3"/>
    <line x1="460" y1="110" x2="460" y2="280" stroke="#C9C0AE" stroke-width="0.7" stroke-dasharray="3 3"/>

    <!-- LEFT REGION: dense measurement scatter (pre-deployment benchmarks) -->
    <g>
      <use href="#markPlus" x="100" y="180"/>
      <use href="#markPlus" x="108" y="195"/>
      <use href="#markPlus" x="116" y="170"/>
      <use href="#markPlus" x="124" y="200"/>
      <use href="#markPlus" x="132" y="185"/>
      <use href="#markPlus" x="140" y="175"/>
      <use href="#markPlus" x="148" y="190"/>
      <use href="#markPlus" x="156" y="205"/>
      <use href="#markPlus" x="164" y="180"/>
      <use href="#markPlus" x="172" y="195"/>
      <use href="#markPlus" x="180" y="170"/>
      <use href="#markPlus" x="188" y="190"/>
      <use href="#markPlus" x="196" y="200"/>
      <use href="#markPlus" x="204" y="180"/>
      <use href="#markPlus" x="212" y="195"/>
      <use href="#markPlus" x="220" y="185"/>
      <use href="#markPlus" x="228" y="200"/>
      <use href="#markDot"  x="105" y="160"/>
      <use href="#markDot"  x="135" y="215"/>
      <use href="#markDot"  x="170" y="160"/>
      <use href="#markDot"  x="200" y="215"/>
      <use href="#markDot"  x="225" y="170"/>
      <use href="#markDot"  x="115" y="220"/>
      <use href="#markDot"  x="180" y="220"/>
    </g>

    <!-- MIDDLE REGION: nearly empty, two faint scattered question marks -->
    <g>
      <text x="290" y="155"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="14" font-style="italic" fill="#7A1F1F" opacity="0.45">?</text>
      <text x="420" y="245"
            font-family="'Fraunces Variable', Georgia, serif"
            font-size="14" font-style="italic" fill="#7A1F1F" opacity="0.45">?</text>
    </g>

    <!-- RIGHT REGION: dense scatter (post-incident forensics) -->
    <g>
      <use href="#markPlus" x="475" y="180"/>
      <use href="#markPlus" x="483" y="195"/>
      <use href="#markPlus" x="491" y="170"/>
      <use href="#markPlus" x="499" y="200"/>
      <use href="#markPlus" x="507" y="185"/>
      <use href="#markPlus" x="515" y="175"/>
      <use href="#markPlus" x="523" y="190"/>
      <use href="#markPlus" x="531" y="205"/>
      <use href="#markPlus" x="539" y="180"/>
      <use href="#markPlus" x="547" y="195"/>
      <use href="#markPlus" x="555" y="170"/>
      <use href="#markPlus" x="563" y="190"/>
      <use href="#markPlus" x="571" y="200"/>
      <use href="#markPlus" x="579" y="180"/>
      <use href="#markPlus" x="587" y="195"/>
      <use href="#markPlus" x="595" y="185"/>
      <use href="#markPlus" x="603" y="200"/>
      <use href="#markDot"  x="480" y="160"/>
      <use href="#markDot"  x="510" y="215"/>
      <use href="#markDot"  x="545" y="160"/>
      <use href="#markDot"  x="575" y="215"/>
      <use href="#markDot"  x="600" y="170"/>
      <use href="#markDot"  x="490" y="220"/>
      <use href="#markDot"  x="555" y="220"/>
    </g>

    <!-- The agent's actual state trajectory:
         solid in observed regions, dashed in the unobserved middle.
         The drift is what we can't see directly. -->
    <!-- Solid trajectory through left region -->
    <path d="M 90 190 Q 130 180, 165 195 T 230 185"
          fill="none" stroke="#7A1F1F" stroke-width="1.4"/>
    <!-- Dashed drift through middle region — rises and falls -->
    <path d="M 230 185 Q 285 145, 350 175 T 450 215 L 470 195"
          fill="none" stroke="#7A1F1F" stroke-width="1.2"
          stroke-dasharray="3 3" opacity="0.7"/>
    <!-- Solid trajectory through right region -->
    <path d="M 470 195 Q 510 205, 545 192 T 610 188"
          fill="none" stroke="#7A1F1F" stroke-width="1.4"/>

    <!-- The key gloss, italic Fraunces, set inside the empty middle -->
    <text x="350" y="200" text-anchor="middle"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="20" font-style="italic" fill="#7A1F1F" font-weight="500"
          font-variation-settings="'opsz' 144, 'WONK' 1">
      the measurement gap
    </text>
    <text x="350" y="220" text-anchor="middle"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="11" font-style="italic" fill="#5C544A">
      where the agent actually runs
    </text>

    <!-- X-axis -->
    <line x1="80" y1="290" x2="630" y2="290" stroke="#7A1F1F" stroke-width="1"/>
    <line x1="630" y1="290" x2="623" y2="287" stroke="#7A1F1F" stroke-width="1"/>
    <line x1="630" y1="290" x2="623" y2="293" stroke="#7A1F1F" stroke-width="1"/>
    <text x="640" y="293"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="10" letter-spacing="1.5" fill="#5C544A">t →</text>

    <!-- Marginalia: a tiny note at right edge of the plot -->
    <text x="615" y="118"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="9" font-style="italic" fill="#5C544A" text-anchor="end">
      (drawn after the fact)
    </text>
    <text x="80" y="105"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="9" font-style="italic" fill="#5C544A">
      (drawn before deployment)
    </text>
  </g>

  <!-- Plate-numeral marker, upper right -->
  <text x="678" y="50" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9.5" letter-spacing="2.5" fill="#7A1F1F" font-weight="500">Pl. I</text>

  <!-- Caption divider rule, with centered fleuron dot -->
  <line x1="80"  y1="370" x2="350" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <circle cx="360" cy="370" r="1.6" fill="#7A1F1F"/>
  <line x1="370" y1="370" x2="640" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <line x1="80"  y1="370" x2="80"  y2="370" stroke="#C9C0AE" stroke-width="0"/>
  <text x="360" y="392"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="3" fill="#7A1F1F" text-anchor="middle">
    FIG. I · THE MEASUREMENT GAP
  </text>
  <text x="360" y="408"
        font-family="'Fraunces Variable', Georgia, serif"
        font-size="11" font-style="italic" fill="#5C544A" text-anchor="middle">
    What lies between the model that was tested and the failure that is forensically reconstructed.
  </text>
</svg>
