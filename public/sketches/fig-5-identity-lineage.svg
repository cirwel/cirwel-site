<!--
  FIG. 5 — Identity & lineage.
  Two columns in the FIG. 1–4 engraving register. Left: a declared lineage
  (parent → child, joined by parent_agent_id). Right: two fresh process-
  instances that mint their own identity by default and share no edge —
  per-instance isolation. Hex device = the publisher's mark, for continuity.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="2160" height="1320">
  <defs>
    <filter id="rough5" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0.5"/>
    </filter>
    <polygon id="idHex" points="-14,-24.2 14,-24.2 28,0 14,24.2 -14,24.2 -28,0"/>
    <marker id="arrow5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Cream paper -->
  <rect width="720" height="440" fill="#F5F1E8"/>

  <!-- Plate frame -->
  <rect x="20" y="20" width="680" height="400" fill="none" stroke="#7A1F1F" stroke-width="1.2"/>
  <rect x="26" y="26" width="668" height="388" fill="none" stroke="#7A1F1F" stroke-width="0.4"/>

  <!-- Corner fleurons -->
  <g stroke="#7A1F1F" stroke-width="0.7" fill="#7A1F1F">
    <line x1="20" y1="20" x2="34" y2="34" fill="none"/><circle cx="22" cy="22" r="1.6"/>
    <line x1="700" y1="20" x2="686" y2="34" fill="none"/><circle cx="698" cy="22" r="1.6"/>
    <line x1="20" y1="420" x2="34" y2="406" fill="none"/><circle cx="22" cy="418" r="1.6"/>
    <line x1="700" y1="420" x2="686" y2="406" fill="none"/><circle cx="698" cy="418" r="1.6"/>
  </g>

  <!-- Plate-numeral marker, upper right -->
  <text x="678" y="50" text-anchor="end"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="9.5" letter-spacing="2.5" fill="#7A1F1F" font-weight="500">Pl. V</text>

  <!-- Divider between the two columns -->
  <line x1="360" y1="78" x2="360" y2="290" stroke="#C9C0AE" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- Column headings -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace"
     font-size="9" letter-spacing="2.5" fill="#5C544A" text-anchor="middle">
    <text x="210" y="74">DECLARED LINEAGE</text>
    <text x="510" y="74">FRESH BY DEFAULT</text>
  </g>

  <g filter="url(#rough5)">

    <!-- LEFT COLUMN: parent -> child, declared -->
    <line x1="210" y1="142" x2="210" y2="206" stroke="#7A1F1F" stroke-width="1.2" marker-end="url(#arrow5)"/>

    <!-- PARENT -->
    <g transform="translate(210,110)">
      <use href="#idHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.4"/>
      <polygon points="-8,-7 8,-7 13,0 8,7 -8,7 -13,0" fill="none" stroke="#7A1F1F" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#7A1F1F"/>
    </g>
    <!-- CHILD -->
    <g transform="translate(210,238)">
      <use href="#idHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.4"/>
      <polygon points="-8,-7 8,-7 13,0 8,7 -8,7 -13,0" fill="none" stroke="#7A1F1F" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#7A1F1F"/>
    </g>

    <!-- edge label -->
    <text x="222" y="178"
          font-family="'JetBrains Mono', ui-monospace, monospace"
          font-size="8" letter-spacing="0.5" fill="#5C544A">parent_agent_id</text>

    <!-- RIGHT COLUMN: two isolated fresh instances, no edge between them -->
    <g transform="translate(510,110)">
      <use href="#idHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.4"/>
      <polygon points="-8,-7 8,-7 13,0 8,7 -8,7 -13,0" fill="none" stroke="#7A1F1F" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#7A1F1F"/>
      <!-- 'minted' spark, upper right -->
      <g stroke="#7A1F1F" stroke-width="0.9" transform="translate(18,-18)">
        <line x1="0" y1="-4" x2="0" y2="4"/><line x1="-4" y1="0" x2="4" y2="0"/>
        <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8"/><line x1="-2.8" y1="2.8" x2="2.8" y2="-2.8"/>
      </g>
    </g>
    <g transform="translate(510,238)">
      <use href="#idHex" fill="#F5F1E8" stroke="#7A1F1F" stroke-width="1.4"/>
      <polygon points="-8,-7 8,-7 13,0 8,7 -8,7 -13,0" fill="none" stroke="#7A1F1F" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#7A1F1F"/>
      <g stroke="#7A1F1F" stroke-width="0.9" transform="translate(18,-18)">
        <line x1="0" y1="-4" x2="0" y2="4"/><line x1="-4" y1="0" x2="4" y2="0"/>
        <line x1="-2.8" y1="-2.8" x2="2.8" y2="2.8"/><line x1="-2.8" y1="2.8" x2="2.8" y2="-2.8"/>
      </g>
    </g>
    <!-- crossed-out link between the two fresh instances: no auto-coupling -->
    <g transform="translate(510,174)" stroke="#5C544A" stroke-width="0.7" opacity="0.6">
      <line x1="-7" y1="-7" x2="7" y2="7"/>
      <line x1="-7" y1="7" x2="7" y2="-7"/>
    </g>

    <!-- node labels -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace"
       font-size="8.5" letter-spacing="1.5" fill="#1A1612" text-anchor="middle" font-weight="500">
      <text x="158" y="113">PARENT</text>
      <text x="160" y="241">CHILD</text>
      <text x="568" y="113">INSTANCE A</text>
      <text x="568" y="241">INSTANCE B</text>
    </g>

    <!-- Italic body subtitle -->
    <text x="360" y="322"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="14" font-style="italic" fill="#1A1612" text-anchor="middle">
      A name is a claim, not a credential.
    </text>
    <text x="360" y="342"
          font-family="'Fraunces Variable', Georgia, serif"
          font-size="14" font-style="italic" fill="#5C544A" text-anchor="middle">
      Lineage is declared, never inherited; the label's source is always exposed.
    </text>
  </g>

  <!-- Caption divider rule, with centered fleuron dot -->
  <line x1="80"  y1="370" x2="350" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <circle cx="360" cy="370" r="1.6" fill="#7A1F1F"/>
  <line x1="370" y1="370" x2="640" y2="370" stroke="#C9C0AE" stroke-width="0.6"/>
  <text x="360" y="392"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="11" letter-spacing="3" fill="#7A1F1F" text-anchor="middle">
    FIG. V · IDENTITY &amp; LINEAGE
  </text>
  <text x="360" y="408"
        font-family="'Fraunces Variable', Georgia, serif"
        font-size="11" font-style="italic" fill="#5C544A" text-anchor="middle">
    Who did what is provable, because identity is bound to the process that claims it.
  </text>
</svg>
